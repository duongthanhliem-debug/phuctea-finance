<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="logo.png">
<title>Phúc Tea P&L</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#F5A623;--gold-l:#FDF3E3;--gold-m:#F7C56E;
  --brown:#3D2B1F;--brown-m:#6B4226;--brown-l:#9C6B47;
  --cream:#FAF7F2;--white:#fff;
  --red:#E53E3E;--red-l:#FFF5F5;
  --green:#2D8248;--green-l:#F0FFF4;
  --gray:#718096;--gray-l:#F7F8FA;
  --border:#E8E0D4;--sh:0 2px 12px rgba(61,43,31,.08);--r:12px;--rs:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--cream);color:var(--brown);line-height:1.5}

/* Logo Setup - Chống bóp méo */
.logo-container img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* Giữ nguyên tỷ lệ ảnh */
}

/* UI Components */
.overlay{position:fixed;inset:0;background:rgba(61,43,31,.8);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.overlay.off{display:none}
.modal{background:var(--white);border-radius:16px;padding:25px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--sh)}
.mlogo{text-align:center;margin-bottom:15px}
.mlogo img{width:120px;height:auto;object-fit:contain}

.nav{background:var(--brown);padding:0 20px;display:flex;align-items:center;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--gold)}
.nbrand{display:flex;align-items:center;gap:10px;padding:10px 0;cursor:pointer}
.nlogo{width:35px;height:35px;display:flex;align-items:center;justify-content:center}
.ntitle{font-size:14px;font-weight:700;color:#fff;text-transform:uppercase}
.ntitle span{color:var(--gold)}

.ntabs{display:flex;margin-left:20px}
.ntab{padding:18px 15px;font-size:13px;font-weight:500;color:rgba(255,255,255,.6);cursor:pointer;border-bottom:3px solid transparent}
.ntab.on{color:var(--gold);border-bottom-color:var(--gold)}

.page{display:none;padding:20px;max-width:1200px;margin:0 auto}
.page.on{display:block}

/* Kế thừa các style bảng và card từ bản trước... */
.card{background:var(--white);border-radius:var(--r);border:1.5px solid var(--border);overflow:hidden;margin-bottom:20px}
.ch{padding:12px 15px;border-bottom:1px solid var(--border);background:var(--gray-l);font-weight:700;font-size:14px}
.cb{padding:15px}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:10px;background:var(--gray-l);color:var(--gray);font-size:11px;text-transform:uppercase}
.tbl td{padding:10px;border-bottom:1px solid var(--border)}

/* P&L Table Style */
.pl-row{display:flex;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px}
.pl-head{background:var(--brown);color:#fff;font-weight:700;border-radius:4px;margin-top:10px}
.pl-subhead{background:var(--brown-l);color:#fff;font-weight:600}
.pl-total{background:var(--gold-l);font-weight:700;border:1px solid var(--gold)}
.pl-net{background:var(--brown);color:var(--gold);font-size:16px;font-weight:700;margin-top:10px}

/* Form Style */
.fg{margin-bottom:12px}
.fl{display:block;font-size:11px;font-weight:700;margin-bottom:5px;color:var(--brown-m)}
.fc{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:inherit}
.btn{padding:10px 15px;border-radius:var(--rs);border:none;font-weight:700;cursor:pointer;font-family:inherit;font-size:13px}
.bp{background:var(--gold);color:var(--brown)}
.bo{background:var(--white);border:1.5px solid var(--border)}

/* Toast & Load */
#toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;background:var(--brown);color:#fff;border-radius:8px;display:none;z-index:2000}
</style>
</head>
<body>

<div id="toast"></div>

<nav class="nav">
  <div class="nbrand" onclick="go('dash')">
    <div class="nlogo logo-container"><img src="logo.png" alt="Logo"></div>
    <div class="ntitle"><span>PHÚC TEA</span> P&L</div>
  </div>
  <div class="ntabs">
    <div class="ntab on" onclick="go('dash')">Dashboard</div>
    <div class="ntab" onclick="go('stores')">Cửa hàng</div>
    <div class="ntab" onclick="go('pl')">P&L Chi tiết</div>
    <div class="ntab" onclick="go('email')">Gửi Email</div>
  </div>
</nav>

<div class="page on" id="p-dash">
    <h2 style="margin-bottom:15px">Tổng quan hệ thống</h2>
    <div id="dash-content">Vui lòng thêm cửa hàng và dữ liệu để xem Dashboard.</div>
</div>

<div class="page" id="p-stores">
    <div style="display:flex;justify-content:space-between;margin-bottom:15px">
        <h2>Quản lý cửa hàng</h2>
        <button class="btn bp" onclick="openStoreModal()">+ Thêm cửa hàng</button>
    </div>
    <div class="card">
        <table class="tbl">
            <thead>
                <tr>
                    <th>ID</th><th>Tên cửa hàng</th><th>Chủ chi nhánh</th><th>Email</th><th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="store-table-body"></tbody>
        </table>
    </div>
</div>

<div class="page" id="p-pl">
    <h2>Báo cáo P&L Chi tiết</h2>
    <div class="fg" style="margin-top:15px">
        <select class="fc" id="pl-select-store" onchange="renderPLDetail()"></select>
    </div>
    <div id="pl-detail-content"></div>
</div>

<div class="page" id="p-email">
    <h2>Gửi báo cáo Email</h2>
    <div class="card" style="margin-top:15px">
        <div class="cb">
            <div class="fg">
                <label class="fl">Chọn cửa hàng</label>
                <select class="fc" id="email-select-store"></select>
            </div>
            <button class="btn bp" onclick="previewEmail()">Xem trước & Gửi</button>
        </div>
    </div>
    <div id="email-preview-area"></div>
</div>

<div class="overlay off" id="store-modal">
    <div class="modal">
        <div class="mlogo logo-container"><img src="logo.png"></div>
        <h3 style="text-align:center;margin-bottom:20px">Thông tin cửa hàng</h3>
        <div class="fg"><label class="fl">Mã cửa hàng</label><input id="s-id" class="fc" placeholder="VD: PT001"></div>
        <div class="fg"><label class="fl">Tên cửa hàng</label><input id="s-name" class="fc" placeholder="VD: Phúc Tea Cần Thơ"></div>
        <div class="fg"><label class="fl">Tên chủ chi nhánh</label><input id="s-owner" class="fc" placeholder="VD: Nguyễn Văn A"></div>
        <div class="fg"><label class="fl">Email nhận báo cáo</label><input id="s-email" class="fc" type="email"></div>
        <div style="display:flex;gap:10px">
            <button class="btn bo" style="flex:1" onclick="closeStoreModal()">Hủy</button>
            <button class="btn bp" style="flex:1" onclick="saveStore()">Lưu lại</button>
        </div>
    </div>
</div>

<script>
// DỮ LIỆU MẪU
let stores = JSON.parse(localStorage.getItem('pt_stores')) || [];
let data = [
    {storeId: 'PT001', category: 'Doanh thu tại chỗ', amount: 50000000, type: 'thu'},
    {storeId: 'PT001', category: 'Chi phí nguyên vật liệu hệ thống', amount: 15000000, type: 'chi'},
    {storeId: 'PT001', category: 'Chi phí vận chuyển', amount: 2000000, type: 'chi'},
    {storeId: 'PT001', category: 'Lương nhân viên', amount: 8000000, type: 'chi'}
];

// 4 Danh mục bắt buộc vào mục B (COGS) theo Brief
const COGS_CATEGORIES = [
    'Chi phí nguyên vật liệu hệ thống',
    'Chi phí nguyên vật liệu địa phương',
    'Chi phí vận chuyển',
    'Chi phí Vật phẩm'
];

function go(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
    document.querySelectorAll('.ntab').forEach(t => t.classList.remove('on'));
    document.getElementById('p-' + pageId).classList.add('on');
    event.currentTarget.classList.add('on');
    if(pageId === 'stores') renderStores();
    if(pageId === 'pl') fillSelects();
    if(pageId === 'email') fillSelects();
}

function openStoreModal() { document.getElementById('store-modal').classList.remove('off'); }
function closeStoreModal() { document.getElementById('store-modal').classList.add('off'); }

function saveStore() {
    const s = {
        id: document.getElementById('s-id').value,
        name: document.getElementById('s-name').value,
        owner: document.getElementById('s-owner').value,
        email: document.getElementById('s-email').value
    };
    if(!s.id || !s.owner) return alert("Vui lòng nhập đủ thông tin");
    stores.push(s);
    localStorage.setItem('pt_stores', JSON.stringify(stores));
    renderStores();
    closeStoreModal();
    showToast("Đã thêm cửa hàng thành công!");
}

function renderStores() {
    const html = stores.map(s => `
        <tr>
            <td>${s.id}</td><td>${s.name}</td><td>${s.owner}</td><td>${s.email}</td>
            <td><button class="btn bo" onclick="deleteStore('${s.id}')">Xóa</button></td>
        </tr>
    `).join('');
    document.getElementById('store-table-body').innerHTML = html;
}

function deleteStore(id) {
    stores = stores.filter(s => s.id !== id);
    localStorage.setItem('pt_stores', JSON.stringify(stores));
    renderStores();
}

function fillSelects() {
    const html = stores.map(s => `<option value="${s.id}">${s.name} (${s.id})</option>`).join('');
    document.getElementById('pl-select-store').innerHTML = html;
    document.getElementById('email-select-store').innerHTML = html;
}

function renderPLDetail() {
    const storeId = document.getElementById('pl-select-store').value;
    const sData = data.filter(d => d.storeId === storeId);
    
    let rev = 0, cogs = 0, opex = 0;
    let revDetails = '', cogsDetails = '', opexDetails = '';

    sData.forEach(d => {
        if(d.type === 'thu') {
            rev += d.amount;
            revDetails += `<div class="pl-row"><span>${d.category}</span><span>${d.amount.toLocaleString()}đ</span></div>`;
        } else {
            // Kiểm tra nếu thuộc 4 danh mục đặc biệt thì cho vào COGS
            if(COGS_CATEGORIES.includes(d.category)) {
                cogs += d.amount;
                cogsDetails += `<div class="pl-row"><span>${d.category}</span><span>${d.amount.toLocaleString()}đ</span></div>`;
            } else {
                opex += d.amount;
                opexDetails += `<div class="pl-row"><span>${d.category}</span><span>${d.amount.toLocaleString()}đ</span></div>`;
            }
        }
    });

    const gross = rev - cogs;
    const net = gross - opex;

    document.getElementById('pl-detail-content').innerHTML = `
        <div class="pl-head pl-row">A — DOANH THU <span>${rev.toLocaleString()}đ</span></div>
        ${revDetails}
        <div class="pl-head pl-subhead pl-row">B — CHI PHÍ VỐN BÁN HÀNG <span>${cogs.toLocaleString()}đ</span></div>
        ${cogsDetails}
        <div class="pl-row pl-total">LỢI NHUẬN GỘP <span>${gross.toLocaleString()}đ</span></div>
        <div class="pl-head pl-subhead pl-row">C — CHI PHÍ VẬN HÀNH <span>${opex.toLocaleString()}đ</span></div>
        ${opexDetails}
        <div class="pl-row pl-net">LỢI NHUẬN RÒNG <span>${net.toLocaleString()}đ</span></div>
    `;
}

function previewEmail() {
    const storeId = document.getElementById('email-select-store').value;
    const s = stores.find(x => x.id === storeId);
    if(!s) return;

    const emailHTML = `
        <div style="font-family:Arial; max-width:600px; border:1px solid #ddd; padding:20px;">
            <div style="text-align:center; background:#3D2B1F; padding:20px;">
                <img src="https://lh3.googleusercontent.com/d/1-u5l-YOUR_IMAGE_ID" alt="Phúc Tea Logo" style="width:120px;">
                <h2 style="color:#F5A623; margin:10px 0;">PHÚC TEA P&L</h2>
            </div>
            <p>Kính gửi anh/chị <b>${s.owner}</b>,</p>
            <p>Phúc Tea gửi báo cáo tài chính định kỳ cho chi nhánh <b>${s.name}</b>...</p>
            <div style="background:#FDF3E3; padding:15px; border-left:5px solid #F5A623;">
                <b>Tóm tắt:</b> Doanh thu ổn định, cần tối ưu chi phí vận hành.
            </div>
            <p>Trân trọng,<br><b>Phúc Tea Operation Team</b></p>
        </div>
    `;
    document.getElementById('email-preview-area').innerHTML = `
        <div class="card" style="margin-top:20px;">
            <div class="ch">Xem trước Email gửi cho ${s.owner}</div>
            <div class="cb">${emailHTML}</div>
            <div class="cb"><button class="btn bp" style="width:100%">XÁC NHẬN GỬI EMAIL</button></div>
        </div>
    `;
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 3000);
}

// Khởi tạo
renderStores();
</script>
</body>
</html>
